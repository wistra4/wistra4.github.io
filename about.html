<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>About — wistra</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f5f3;
      --border: #d8d8d6;
      --text: #000;
      --muted: #999;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    header {
      padding: 36px 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--text);
    }

    nav { display: flex; gap: 32px; }

    nav a {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-decoration: none;
      color: var(--muted);
      transition: color 0.2s;
    }

    nav a:hover, nav a.active { color: var(--text); }

    .page-title {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 14px 56px;
    }

    .page-title h1 {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.25em;
      color: var(--muted);
    }

    .content {
      padding: 64px 56px;
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 64px;
      align-items: start;
    }

    .photo {
      background: var(--border);
      overflow: hidden;
      position: relative;
    }

    .photo img {
      width: 100%;
      height: auto;
      display: block;
    }

    .photo-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; color: #bbb; letter-spacing: 0.2em;
    }

    .profile-name {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 32px;
    }

    .profile-text {
      font-size: 13px;
      line-height: 2;
      color: #333;
      margin-bottom: 48px;
    }

    .sns-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.25em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .sns-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sns-links a {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }

    .sns-links a:hover { color: var(--muted); }

    .sns-links a::before {
      content: '↗';
      font-size: 10px;
      color: var(--muted);
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 24px 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-copy { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a {
      font-size: 9px; letter-spacing: 0.12em;
      text-decoration: none; color: var(--muted); transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--text); }
  </style>
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <header>
    <a href="index.html" class="logo">wistra</a>
    <nav>
      <a href="works.html">WORKS</a>
      <a href="dj.html">DJ</a>
      <a href="about.html" class="active">ABOUT</a>
    </nav>
  </header>

  <div class="page-title"><h1>ABOUT</h1></div>

  <div class="content">
    <div class="photo">
      <img id="audio-photo" src="img/me.JPG" alt="wistra" onerror="this.parentNode.innerHTML='<div class=\'photo-placeholder\'>PHOTO</div>'">
    </div>

    <div>
      <div class="profile-name">wistra</div>
      <div class="profile-text">
        山口県出身。青年期の心象風景を元に自身の興味を広げながら選曲、オーガナイズを模索している。<br><br>
        阿佐ヶ谷のDJ Bar Cafeinで"數寄屋 -SUKIYA-"、渋谷Tangleで"HIBACHI"、不定期開催の"WAVES"を主宰。<br><br>
        2026年にレコードショップ「三輪社」を共同創設。
      </div>

      <div class="sns-label">LINKS</div>
      <div class="sns-links">
        <a href="https://www.instagram.com/wistra4/" target="_blank">Instagram @wistra4</a>
        <a href="https://www.instagram.com/three_wheeler_records/" target="_blank">Instagram @three_wheeler_records</a>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-copy">© 2026 wistra</div>
    <div class="footer-links">
      <a href="https://www.instagram.com/wistra4/" target="_blank">INSTAGRAM</a>
    </div>
  </footer>

<canvas id="overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;"></canvas>

<script>
  // ── Aマイナーペンタトニック（3オクターブ）──
  const NOTES = [
    110, 130.81, 146.83, 164.81, 196,
    220, 261.63, 293.66, 329.63, 392,
    440, 523.25, 587.33, 659.25, 784
  ];

  let audioCtx = null, masterGain;
  let lastPlayTime = 0;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.22;

    const delay = audioCtx.createDelay(4);
    delay.delayTime.value = 0.38;
    const fbGain = audioCtx.createGain();
    fbGain.gain.value = 0.52;
    const fbFilter = audioCtx.createBiquadFilter();
    fbFilter.type = 'lowpass';
    fbFilter.frequency.value = 1600;
    delay.connect(fbFilter);
    fbFilter.connect(fbGain);
    fbGain.connect(delay);
    masterGain.connect(delay);
    masterGain.connect(audioCtx.destination);
  }

  function playNote(freq) {
    const now = performance.now();
    if (now - lastPlayTime < 120) return;
    lastPlayTime = now;
    const t = audioCtx.currentTime;
    [0, 7].forEach(d => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc.type = 'sine';
      osc.frequency.value = freq;
      osc.detune.value = d + (Math.random() - 0.5) * 6;
      filter.type = 'lowpass';
      filter.frequency.value = 850;
      filter.Q.value = 0.7;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.13, t + 0.35);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 3.8);
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);
      osc.start(t);
      osc.stop(t + 4.2);
    });
  }

  function noteFromX(x) {
    const idx = Math.floor((x / window.innerWidth) * NOTES.length);
    return NOTES[Math.min(idx, NOTES.length - 1)];
  }

  // ── Overlay canvas ──
  const overlay = document.getElementById('overlay');
  const oc = overlay.getContext('2d');

  function resizeOverlay() {
    overlay.width = window.innerWidth;
    overlay.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeOverlay);

  // ── 波紋 ──
  const ripples = [];

  function addRipple(x, y) {
    ripples.push({ x, y, r: 0, life: 1.0 });
  }

  // ── メインループ ──
  function loop() {
    oc.clearRect(0, 0, overlay.width, overlay.height);

    for (let i = ripples.length - 1; i >= 0; i--) {
      const rp = ripples[i];
      rp.r    += 3.2;
      rp.life -= 0.013;
      if (rp.life <= 0) { ripples.splice(i, 1); continue; }

      // 外に広がる3リング、間隔28px
      for (let k = 0; k < 3; k++) {
        const kr = rp.r - k * 28;
        if (kr <= 0) continue;
        const progress = Math.min(1, rp.r / 180);
        const alpha    = rp.life * (1 - k * 0.32) * (1 - progress * 0.45);
        oc.beginPath();
        oc.arc(rp.x, rp.y, kr, 0, Math.PI * 2);
        oc.strokeStyle = `rgba(0,0,0,${alpha * 0.55})`;
        oc.lineWidth   = Math.max(0.3, rp.life * 2.0 - k * 0.4);
        oc.stroke();
      }

      // 着水点のフラッシュ（最初だけ）
      if (rp.r < 12) {
        oc.beginPath();
        oc.arc(rp.x, rp.y, rp.r * 0.4, 0, Math.PI * 2);
        oc.fillStyle = `rgba(0,0,0,${rp.life * 0.18})`;
        oc.fill();
      }
    }

    requestAnimationFrame(loop);
  }

  // ── インタラクション ──
  function interact(x, y) {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    addRipple(x, y);
    playNote(noteFromX(x));
  }

  document.addEventListener('click', e => interact(e.clientX, e.clientY));
  document.addEventListener('touchstart', e => {
    Array.from(e.changedTouches).forEach(t => interact(t.clientX, t.clientY));
  }, { passive: true });

  document.querySelectorAll('nav a').forEach((a, i) => {
    a.addEventListener('mouseenter', () => {
      if (!audioCtx) return;
      playNote(NOTES[i * 4 + 4]);
    });
  });

  window.addEventListener('load', () => {
    resizeOverlay();
    loop();
  });
</script>
</body>
</html>
