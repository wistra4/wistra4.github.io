<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>wistra</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f2ede8;
      --border: #ddd8d2;
      --text: #1a1a1a;
      --muted: #999;
      --accent: #b89a80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    header {
      padding: 36px 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--text);
    }

    .page-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.25em;
      color: var(--muted);
    }

    /* ── Author bar ── */
    .author-bar {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 12px 56px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .author-bar-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    .author-choices { display: flex; gap: 6px; }

    .author-btn {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.15em;
      padding: 4px 12px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }

    .author-btn.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .author-btn:hover:not(.active) {
      border-color: #bbb;
      color: var(--text);
    }

    /* ── Section ── */
    .section {
      border-top: 1px solid var(--border);
      padding: 64px 56px;
    }

    .section-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.25em;
      color: var(--muted);
      margin-bottom: 32px;
    }

    /* ── Track items ── */
    .track-list { display: flex; flex-direction: column; }

    .track-item {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 56px;
      border-bottom: 1px solid var(--border);
      padding: 36px 0;
      align-items: start;
    }

    .track-item:first-child { border-top: 1px solid var(--border); }

    .track-num {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .track-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .track-meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Poem side ── */
    .poem-side { display: flex; flex-direction: column; gap: 0; }

    /* ── Entry list ── */
    .entry-list { display: flex; flex-direction: column; margin-top: 16px; }

    .entry-item {
      padding: 16px 0;
      border-bottom: 1px dashed var(--border);
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .entry-item:first-child { border-top: 1px dashed var(--border); }

    .entry-body { flex: 1; }

    .entry-meta {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .entry-author-name { color: var(--accent); }

    .entry-text {
      font-size: 14px;
      line-height: 2;
      white-space: pre-wrap;
      font-style: italic;
      letter-spacing: 0.01em;
    }

    .entry-btns {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }

    .entry-edit-btn,
    .entry-del-btn {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s, opacity 0.15s;
      opacity: 0;
    }

    .entry-item:hover .entry-edit-btn,
    .entry-item:hover .entry-del-btn { opacity: 1; }

    .entry-edit-btn:hover { color: var(--text); }
    .entry-del-btn:hover  { color: #c0392b; }

    /* ── Inline edit ── */
    .entry-inline-edit {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .entry-inline-edit.open { display: flex; }

    .entry-inline-textarea {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.8;
      border: 1px solid var(--accent);
      background: #fff;
      outline: none;
      resize: vertical;
      color: var(--text);
      padding: 12px;
      min-height: 140px;
      width: 100%;
      border-radius: 2px;
    }

    .entry-inline-btns { display: flex; gap: 10px; }

    .entry-save-btn,
    .entry-cancel-btn {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      letter-spacing: 0.12em;
      padding: 4px 10px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }

    .entry-save-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Pagination ── */
    .page-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
    }

    .page-chip {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      width: 24px;
      height: 24px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }

    .page-chip.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .page-chip:hover:not(.active) { border-color: #bbb; color: var(--text); }

    .page-arrow {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0 2px;
      transition: color 0.15s;
    }

    .page-arrow:hover { color: var(--text); }
    .page-arrow:disabled { opacity: 0.25; cursor: default; }

    /* ── Write area ── */
    .draft-indicator {
      font-size: 9px;
      color: var(--accent);
      letter-spacing: 0.1em;
      height: 16px;
      margin-bottom: 6px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .draft-indicator.visible { opacity: 1; }

    .write-area {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .write-textarea {
      flex: 1;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.8;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      outline: none;
      resize: none;
      color: var(--text);
      padding: 4px 0;
      height: 32px;
      transition: height 0.2s, border-color 0.2s;
      overflow: hidden;
    }

    .write-textarea:focus {
      height: 100px;
      border-bottom-color: var(--accent);
    }

    .write-textarea::placeholder {
      color: var(--muted);
      letter-spacing: 0.06em;
      font-style: italic;
    }

    .write-submit {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.15em;
      padding: 6px 14px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .write-submit:hover  { border-color: var(--accent); color: var(--accent); }
    .write-submit:active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Diary section ── */
    .diary-write-area { max-width: 600px; }

    /* ── Playlist embed ── */
    .music-embed { max-width: 660px; }
    .music-embed iframe { width: 100%; display: block; border: none; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 48px;
    }

    .footer-copy { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; }
    .footer-back { font-size: 9px; letter-spacing: 0.12em; text-decoration: none; color: var(--muted); transition: color 0.2s; }
    .footer-back:hover { color: var(--text); }

    @media (max-width: 768px) {
      header      { padding: 24px 20px; }
      .author-bar { padding: 12px 20px; }
      .section    { padding: 40px 20px; }
      footer      { padding: 20px; }

      .track-item {
        grid-template-columns: 1fr;
        gap: 24px;
      }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">oshaberi</a>
    <span class="page-label">PRIVATE</span>
  </header>

  <div class="author-bar">
    <span class="author-bar-label">あなたは？</span>
    <div class="author-choices">
      <button class="author-btn" data-author="けいすけ">けいすけ</button>
      <button class="author-btn" data-author="なみ">なみ</button>
    </div>
  </div>

  <!-- 交換日記 -->
  <div class="section">
    <div class="section-label">書き置き</div>
    <div class="diary-write-area">
      <div class="draft-indicator" id="diary-draft-indicator">下書き保存済み</div>
      <div class="write-area">
        <textarea class="write-textarea" id="diary-textarea" placeholder="書き置く"></textarea>
        <button class="write-submit" id="diary-submit">送る</button>
      </div>
    </div>
    <div class="entry-list" id="diary-entries"></div>
    <div class="page-controls" id="diary-page-controls"></div>
  </div>

  <!-- TRACKS -->
  <div class="section">
    <div class="section-label">TRACKS</div>
    <div class="track-list">

      <div class="track-item" data-id="track_01">
        <div class="track-side">
          <div class="track-num">01</div>
          <div class="track-title">—</div>
          <div class="track-meta">—</div>
        </div>
        <div class="poem-side">
          <div class="draft-indicator">下書き保存済み</div>
          <div class="write-area">
            <textarea class="write-textarea" placeholder="ことば"></textarea>
            <button class="write-submit">送る</button>
          </div>
          <div class="entry-list"></div>
          <div class="page-controls"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- PLAYLIST -->
  <div class="section">
    <div class="section-label">PLAYLIST</div>
    <div class="music-embed">
      <iframe
        allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write"
        frameborder="0"
        height="450"
        sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation"
        src="https://embed.music.apple.com/jp/playlist/walk-dance-sleep/pl.u-EdAVA33IaXqe4ly">
      </iframe>
    </div>
  </div>

  <footer>
    <div class="footer-copy">© 2026 wistra</div>
    <a href="index.html" class="footer-back">← HOME</a>
  </footer>

<canvas id="overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;"></canvas>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, query, orderBy, onSnapshot, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyC4Cb_PH2MtnDBtCgFaq-wv-49VNmewuF0",
    authDomain: "wistra-private.firebaseapp.com",
    projectId: "wistra-private",
    storageBucket: "wistra-private.firebasestorage.app",
    messagingSenderId: "528920414712",
    appId: "1:528920414712:web:447094f331c6b40d542e0d"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── 著者選択 ──
  let currentAuthor = localStorage.getItem('author') || '';
  const authorBtns = document.querySelectorAll('.author-btn');

  function updateAuthorUI() {
    authorBtns.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.author === currentAuthor);
    });
  }

  authorBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      currentAuthor = btn.dataset.author;
      localStorage.setItem('author', currentAuthor);
      updateAuthorUI();
    });
  });

  updateAuthorUI();

  // ── エントリー描画ユーティリティ ──
  const PER_PAGE = 3;

  function formatDate(ts) {
    if (!ts) return '';
    const d = ts.toDate();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const h   = String(d.getHours()).padStart(2, '0');
    const min = String(d.getMinutes()).padStart(2, '0');
    return `${y}.${m}.${day}  ${h}:${min}`;
  }

  function createEntryEl(docRef, data, onUpdate) {
    const { text, author, createdAt } = data;
    const wrap = document.createElement('div');
    wrap.className = 'entry-item';

    const body = document.createElement('div');
    body.className = 'entry-body';

    const meta = document.createElement('div');
    meta.className = 'entry-meta';
    if (author) {
      const nameSpan = document.createElement('span');
      nameSpan.className = 'entry-author-name';
      nameSpan.textContent = author;
      meta.appendChild(nameSpan);
      meta.appendChild(document.createTextNode('  ·  ' + formatDate(createdAt)));
    } else {
      meta.textContent = formatDate(createdAt);
    }

    const textEl = document.createElement('div');
    textEl.className = 'entry-text';
    textEl.textContent = text;

    const inlineEdit = document.createElement('div');
    inlineEdit.className = 'entry-inline-edit';

    const inlineTA = document.createElement('textarea');
    inlineTA.className = 'entry-inline-textarea';

    const inlineBtns = document.createElement('div');
    inlineBtns.className = 'entry-inline-btns';

    const saveBtn = document.createElement('button');
    saveBtn.className = 'entry-save-btn';
    saveBtn.textContent = '保存';

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'entry-cancel-btn';
    cancelBtn.textContent = 'キャンセル';

    inlineBtns.appendChild(saveBtn);
    inlineBtns.appendChild(cancelBtn);
    inlineEdit.appendChild(inlineTA);
    inlineEdit.appendChild(inlineBtns);

    body.appendChild(meta);
    body.appendChild(textEl);
    body.appendChild(inlineEdit);

    const btns = document.createElement('div');
    btns.className = 'entry-btns';

    const editBtn = document.createElement('button');
    editBtn.className = 'entry-edit-btn';
    editBtn.textContent = '編集';

    const delBtn = document.createElement('button');
    delBtn.className = 'entry-del-btn';
    delBtn.textContent = '消す';

    btns.appendChild(editBtn);
    btns.appendChild(delBtn);

    editBtn.addEventListener('click', () => {
      inlineTA.value = textEl.textContent;
      inlineEdit.classList.add('open');
      textEl.style.display = 'none';
      btns.style.display = 'none';
      inlineTA.focus();
    });

    cancelBtn.addEventListener('click', () => {
      inlineEdit.classList.remove('open');
      textEl.style.display = '';
      btns.style.display = '';
    });

    saveBtn.addEventListener('click', async () => {
      const newText = inlineTA.value.trim();
      if (!newText) return;
      saveBtn.textContent = '...';
      await updateDoc(docRef, { text: newText });
      inlineEdit.classList.remove('open');
      textEl.style.display = '';
      btns.style.display = '';
      saveBtn.textContent = '保存';
    });

    delBtn.addEventListener('click', async () => {
      if (!confirm('消していい？')) return;
      await deleteDoc(docRef);
    });

    wrap.appendChild(body);
    wrap.appendChild(btns);
    return wrap;
  }

  function setupSection({ colRef, draftKey, entriesList, pageControls, textarea, submitBtn, indicator }) {
    let allEntries = [];
    let currentPage = 1;

    function renderPage() {
      entriesList.innerHTML = '';
      const total = allEntries.length;
      const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
      if (currentPage > totalPages) currentPage = totalPages;

      const start = (currentPage - 1) * PER_PAGE;
      allEntries.slice(start, start + PER_PAGE).forEach(e => {
        const docRef = doc(db, ...colRef, e.id);
        entriesList.appendChild(createEntryEl(docRef, e, renderPage));
      });

      // page chips
      pageControls.innerHTML = '';
      if (totalPages > 1) {
        const prevBtn = document.createElement('button');
        prevBtn.className = 'page-arrow';
        prevBtn.textContent = '←';
        prevBtn.disabled = currentPage <= 1;
        prevBtn.addEventListener('click', () => { currentPage--; renderPage(); });
        pageControls.appendChild(prevBtn);

        for (let p = 1; p <= totalPages; p++) {
          const chip = document.createElement('button');
          chip.className = 'page-chip' + (p === currentPage ? ' active' : '');
          chip.textContent = p;
          chip.addEventListener('click', () => { currentPage = p; renderPage(); });
          pageControls.appendChild(chip);
        }

        const nextBtn = document.createElement('button');
        nextBtn.className = 'page-arrow';
        nextBtn.textContent = '→';
        nextBtn.disabled = currentPage >= totalPages;
        nextBtn.addEventListener('click', () => { currentPage++; renderPage(); });
        pageControls.appendChild(nextBtn);
      }
    }

    // 下書き復元
    const saved = localStorage.getItem(draftKey);
    if (saved) {
      textarea.value = saved;
      textarea.style.height = '100px';
      indicator.classList.add('visible');
    }

    let saveTimer;
    textarea.addEventListener('input', () => {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        if (textarea.value.trim()) {
          localStorage.setItem(draftKey, textarea.value);
          indicator.classList.add('visible');
        } else {
          localStorage.removeItem(draftKey);
          indicator.classList.remove('visible');
        }
      }, 600);
    });

    const ref = collection(db, ...colRef);
    onSnapshot(query(ref, orderBy('createdAt', 'desc')), snapshot => {
      allEntries = snapshot.docs.map(s => ({ id: s.id, ...s.data() }));
      renderPage();
    });

    submitBtn.addEventListener('click', async () => {
      const text = textarea.value.trim();
      if (!text) return;
      submitBtn.textContent = '...';
      await addDoc(ref, { text, author: currentAuthor, createdAt: serverTimestamp() });
      textarea.value = '';
      textarea.style.height = '32px';
      submitBtn.textContent = '送る';
      localStorage.removeItem(draftKey);
      indicator.classList.remove('visible');
      currentPage = 1;
    });
  }

  // ── 書き置き（既存データそのまま） ──
  setupSection({
    colRef:       ['poems', 'track_01', 'entries'],
    draftKey:     'draft_diary',
    entriesList:  document.getElementById('diary-entries'),
    pageControls: document.getElementById('diary-page-controls'),
    textarea:     document.getElementById('diary-textarea'),
    submitBtn:    document.getElementById('diary-submit'),
    indicator:    document.getElementById('diary-draft-indicator'),
  });

  // ── TRACKS ──
  document.querySelectorAll('.track-item').forEach(item => {
    const id = item.dataset.id;
    setupSection({
      colRef:       ['words', id, 'entries'],
      draftKey:     `draft_${id}`,
      entriesList:  item.querySelector('.entry-list'),
      pageControls: item.querySelector('.page-controls'),
      textarea:     item.querySelector('.write-textarea'),
      submitBtn:    item.querySelector('.write-submit'),
      indicator:    item.querySelector('.draft-indicator'),
    });
  });
</script>

<script>
  const overlay = document.getElementById('overlay');
  const oc = overlay.getContext('2d');

  function resizeOverlay() {
    overlay.width  = window.innerWidth;
    overlay.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeOverlay);

  const ripples = [];
  function addRipple(x, y) { ripples.push({ x, y, r: 0, life: 1.0 }); }

  function loop() {
    oc.clearRect(0, 0, overlay.width, overlay.height);
    for (let i = ripples.length - 1; i >= 0; i--) {
      const rp = ripples[i];
      rp.r    += 3.2;
      rp.life -= 0.013;
      if (rp.life <= 0) { ripples.splice(i, 1); continue; }
      for (let k = 0; k < 3; k++) {
        const kr = rp.r - k * 28;
        if (kr <= 0) continue;
        const progress = Math.min(1, rp.r / 180);
        const alpha    = rp.life * (1 - k * 0.32) * (1 - progress * 0.45);
        oc.beginPath();
        oc.arc(rp.x, rp.y, kr, 0, Math.PI * 2);
        oc.strokeStyle = `rgba(100,70,50,${alpha * 0.4})`;
        oc.lineWidth   = Math.max(0.3, rp.life * 2.0 - k * 0.4);
        oc.stroke();
      }
      if (rp.r < 12) {
        oc.beginPath();
        oc.arc(rp.x, rp.y, rp.r * 0.4, 0, Math.PI * 2);
        oc.fillStyle = `rgba(100,70,50,${rp.life * 0.15})`;
        oc.fill();
      }
    }
    requestAnimationFrame(loop);
  }

  document.addEventListener('click', e => addRipple(e.clientX, e.clientY));
  document.addEventListener('touchstart', e => {
    Array.from(e.changedTouches).forEach(t => addRipple(t.clientX, t.clientY));
  }, { passive: true });

  window.addEventListener('load', () => { resizeOverlay(); loop(); });
</script>
</body>
</html>
