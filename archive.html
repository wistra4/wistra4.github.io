<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>wistra</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f2ede8;
      --border: #ddd8d2;
      --text: #1a1a1a;
      --muted: #999;
      --accent: #b89a80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    header {
      padding: 36px 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--text);
    }

    .page-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.25em;
      color: var(--muted);
    }

    .hero {
      border-top: 1px solid var(--border);
      padding: 80px 56px 64px;
    }

    .hero-eyebrow {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.3em;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .hero-title {
      font-size: clamp(40px, 7vw, 80px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    /* ── Section ── */
    .section {
      border-top: 1px solid var(--border);
      padding: 64px 56px;
    }

    .section-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.25em;
      color: var(--muted);
      margin-bottom: 32px;
    }

    /* ── Track items ── */
    .track-list { display: flex; flex-direction: column; }

    .track-item {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 56px;
      border-bottom: 1px solid var(--border);
      padding: 36px 0;
      align-items: start;
    }

    .track-item:first-child { border-top: 1px solid var(--border); }

    .track-num {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .track-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .track-meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Poem side ── */
    .poem-side { display: flex; flex-direction: column; gap: 0; }

    .poem-entries {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }

    .poem-entry {
      padding: 16px 0;
      border-bottom: 1px dashed var(--border);
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .poem-entry:first-child { border-top: 1px dashed var(--border); }

    .poem-text {
      flex: 1;
      font-size: 14px;
      line-height: 2;
      white-space: pre-wrap;
      font-style: italic;
      letter-spacing: 0.01em;
    }

    .poem-date {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    .poem-delete-entry {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s, opacity 0.15s;
      flex-shrink: 0;
      opacity: 0;
    }

    .poem-entry:hover .poem-delete-entry,
    .poem-entry:hover .poem-edit-entry { opacity: 1; }
    .poem-delete-entry:hover { color: #c0392b; }
    .poem-edit-entry:hover { color: var(--text); }

    .poem-entry-btns {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }

    .poem-edit-entry {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s, opacity 0.15s;
      opacity: 0;
    }

    .poem-inline-edit {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .poem-inline-edit.open { display: flex; }

    .poem-inline-textarea {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.8;
      border: none;
      border-bottom: 1px solid var(--accent);
      background: transparent;
      outline: none;
      resize: none;
      color: var(--text);
      padding: 4px 0;
      height: 80px;
    }

    .poem-inline-btns { display: flex; gap: 10px; }

    .poem-save-entry,
    .poem-cancel-entry {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      letter-spacing: 0.12em;
      padding: 4px 10px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }

    .poem-save-entry:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Pagination ── */
    .pagination-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
      margin-bottom: 4px;
    }

    .per-page-label {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .per-page-chips { display: flex; gap: 4px; }

    .per-page-chip {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      width: 24px;
      height: 24px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }

    .per-page-chip.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .per-page-chip:hover:not(.active) {
      border-color: #bbb;
      color: var(--text);
    }

    .page-nav {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 16px;
    }

    .page-prev, .page-next {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0;
      transition: color 0.15s;
    }

    .page-prev:hover, .page-next:hover { color: var(--text); }
    .page-prev:disabled, .page-next:disabled { opacity: 0.25; cursor: default; }

    .page-info {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ── Write area ── */
    .draft-indicator {
      font-size: 9px;
      color: var(--accent);
      letter-spacing: 0.1em;
      height: 16px;
      margin-bottom: 6px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .draft-indicator.visible { opacity: 1; }

    .poem-write {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .poem-textarea {
      flex: 1;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.8;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      outline: none;
      resize: none;
      color: var(--text);
      padding: 4px 0;
      height: 32px;
      transition: height 0.2s, border-color 0.2s;
      overflow: hidden;
    }

    .poem-textarea:focus {
      height: 100px;
      border-bottom-color: var(--accent);
    }

    .poem-textarea::placeholder {
      color: var(--muted);
      letter-spacing: 0.06em;
      font-style: italic;
    }

    .poem-submit {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.15em;
      padding: 6px 14px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .poem-submit:hover  { border-color: var(--accent); color: var(--accent); }
    .poem-submit:active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Playlist embed ── */
    .music-embed { max-width: 660px; }
    .music-embed iframe { width: 100%; display: block; border: none; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 48px;
    }

    .footer-copy { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; }
    .footer-back { font-size: 9px; letter-spacing: 0.12em; text-decoration: none; color: var(--muted); transition: color 0.2s; }
    .footer-back:hover { color: var(--text); }

    @media (max-width: 768px) {
      header   { padding: 24px 20px; }
      .hero    { padding: 48px 20px 40px; }
      .section { padding: 40px 20px; }
      footer   { padding: 20px; }

      .track-item {
        grid-template-columns: 1fr;
        gap: 24px;
      }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">oshaberi</a>
    <span class="page-label">PRIVATE</span>
  </header>


  <div class="section">
    <div class="section-label">TRACKS</div>
    <div class="track-list">

      <div class="track-item" data-id="track_01">
        <div class="track-side">
          <div class="track-num">01</div>
          <div class="track-title">—</div>
          <div class="track-meta">—</div>
        </div>
        <div class="poem-side">
          <div class="draft-indicator">下書き保存済み</div>
          <div class="poem-write">
            <textarea class="poem-textarea" placeholder="ことば"></textarea>
            <button class="poem-submit">送る</button>
          </div>
          <div class="pagination-controls">
            <span class="per-page-label">表示</span>
            <div class="per-page-chips">
              <button class="per-page-chip" data-n="1">1</button>
              <button class="per-page-chip" data-n="2">2</button>
              <button class="per-page-chip active" data-n="3">3</button>
              <button class="per-page-chip" data-n="4">4</button>
              <button class="per-page-chip" data-n="5">5</button>
            </div>
          </div>
          <div class="poem-entries"></div>
          <div class="page-nav">
            <button class="page-prev">←</button>
            <span class="page-info"></span>
            <button class="page-next">→</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="section">
    <div class="section-label">PLAYLIST</div>
    <div class="music-embed">
      <iframe
        allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write"
        frameborder="0"
        height="450"
        sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation"
        src="https://embed.music.apple.com/jp/playlist/walk-dance-sleep/pl.u-EdAVA33IaXqe4ly">
      </iframe>
    </div>
  </div>

  <footer>
    <div class="footer-copy">© 2026 wistra</div>
    <a href="index.html" class="footer-back">← HOME</a>
  </footer>

<canvas id="overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;"></canvas>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, query, orderBy, onSnapshot, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyC4Cb_PH2MtnDBtCgFaq-wv-49VNmewuF0",
    authDomain: "wistra-private.firebaseapp.com",
    projectId: "wistra-private",
    storageBucket: "wistra-private.firebasestorage.app",
    messagingSenderId: "528920414712",
    appId: "1:528920414712:web:447094f331c6b40d542e0d"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  document.querySelectorAll('.track-item').forEach(item => {
    const id          = item.dataset.id;
    const entriesList = item.querySelector('.poem-entries');
    const textarea    = item.querySelector('.poem-textarea');
    const btn         = item.querySelector('.poem-submit');
    const indicator   = item.querySelector('.draft-indicator');
    const prevBtn     = item.querySelector('.page-prev');
    const nextBtn     = item.querySelector('.page-next');
    const pageInfo    = item.querySelector('.page-info');
    const chips       = item.querySelectorAll('.per-page-chip');
    const entriesRef  = collection(db, 'poems', id, 'entries');
    const draftKey    = `draft_${id}`;
    const perPageKey  = `perPage_${id}`;

    let allEntries = [];
    let currentPage = 1;
    let perPage = parseInt(localStorage.getItem(perPageKey) || '3');

    // per-page チップ初期化
    chips.forEach(chip => {
      if (parseInt(chip.dataset.n) === perPage) chip.classList.add('active');
      else chip.classList.remove('active');
      chip.addEventListener('click', () => {
        chips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        perPage = parseInt(chip.dataset.n);
        localStorage.setItem(perPageKey, perPage);
        currentPage = 1;
        renderPage();
      });
    });

    function renderPage() {
      entriesList.innerHTML = '';
      const total = allEntries.length;
      const totalPages = Math.max(1, Math.ceil(total / perPage));
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * perPage;
      allEntries.slice(start, start + perPage).forEach(e => {
        entriesList.appendChild(createEntry(id, e.id, e.text, e.createdAt));
      });
      pageInfo.textContent = total > 0 ? `${currentPage} / ${totalPages}` : '';
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;
      prevBtn.style.display = totalPages <= 1 ? 'none' : '';
      nextBtn.style.display = totalPages <= 1 ? 'none' : '';
      pageInfo.style.display = totalPages <= 1 ? 'none' : '';
    }

    prevBtn.addEventListener('click', () => { currentPage--; renderPage(); });
    nextBtn.addEventListener('click', () => { currentPage++; renderPage(); });

    // 下書き復元
    const saved = localStorage.getItem(draftKey);
    if (saved) {
      textarea.value = saved;
      textarea.style.height = '100px';
      indicator.classList.add('visible');
    }

    // 自動保存
    let saveTimer;
    textarea.addEventListener('input', () => {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        if (textarea.value.trim()) {
          localStorage.setItem(draftKey, textarea.value);
          indicator.classList.add('visible');
        } else {
          localStorage.removeItem(draftKey);
          indicator.classList.remove('visible');
        }
      }, 600);
    });

    onSnapshot(query(entriesRef, orderBy('createdAt', 'desc')), snapshot => {
      allEntries = snapshot.docs.map(snap => ({
        id: snap.id, ...snap.data()
      }));
      renderPage();
    });

    btn.addEventListener('click', async () => {
      const text = textarea.value.trim();
      if (!text) return;
      btn.textContent = '...';
      await addDoc(entriesRef, { text, createdAt: serverTimestamp() });
      textarea.value = '';
      textarea.style.height = '32px';
      btn.textContent = '送る';
      localStorage.removeItem(draftKey);
      indicator.classList.remove('visible');
      currentPage = 1;
    });
  });

  function formatDate(ts) {
    if (!ts) return '';
    const d = ts.toDate();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const h = String(d.getHours()).padStart(2, '0');
    const min = String(d.getMinutes()).padStart(2, '0');
    return `${y}.${m}.${day}  ${h}:${min}`;
  }

  function createEntry(trackId, entryId, text, createdAt) {
    const wrap = document.createElement('div');
    wrap.className = 'poem-entry';

    const textEl = document.createElement('div');
    textEl.className = 'poem-text';
    textEl.textContent = text;

    const dateEl = document.createElement('div');
    dateEl.className = 'poem-date';
    dateEl.textContent = formatDate(createdAt);

    const btns = document.createElement('div');
    btns.className = 'poem-entry-btns';

    const editBtn = document.createElement('button');
    editBtn.className = 'poem-edit-entry';
    editBtn.textContent = '編集';

    const delBtn = document.createElement('button');
    delBtn.className = 'poem-delete-entry';
    delBtn.textContent = '消す';

    btns.appendChild(editBtn);
    btns.appendChild(delBtn);

    const inlineEdit = document.createElement('div');
    inlineEdit.className = 'poem-inline-edit';

    const inlineTextarea = document.createElement('textarea');
    inlineTextarea.className = 'poem-inline-textarea';

    const inlineBtns = document.createElement('div');
    inlineBtns.className = 'poem-inline-btns';

    const saveBtn = document.createElement('button');
    saveBtn.className = 'poem-save-entry';
    saveBtn.textContent = '保存';

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'poem-cancel-entry';
    cancelBtn.textContent = 'キャンセル';

    inlineBtns.appendChild(saveBtn);
    inlineBtns.appendChild(cancelBtn);
    inlineEdit.appendChild(inlineTextarea);
    inlineEdit.appendChild(inlineBtns);

    editBtn.addEventListener('click', () => {
      inlineTextarea.value = textEl.textContent;
      inlineEdit.classList.add('open');
      textEl.style.display = 'none';
      btns.style.display = 'none';
      inlineTextarea.focus();
    });

    cancelBtn.addEventListener('click', () => {
      inlineEdit.classList.remove('open');
      textEl.style.display = '';
      btns.style.display = '';
    });

    saveBtn.addEventListener('click', async () => {
      const newText = inlineTextarea.value.trim();
      if (!newText) return;
      saveBtn.textContent = '...';
      await updateDoc(doc(db, 'poems', trackId, 'entries', entryId), { text: newText });
      inlineEdit.classList.remove('open');
      textEl.style.display = '';
      btns.style.display = '';
      saveBtn.textContent = '保存';
    });

    delBtn.addEventListener('click', async () => {
      if (!confirm('消していい？')) return;
      await deleteDoc(doc(db, 'poems', trackId, 'entries', entryId));
    });

    wrap.appendChild(textEl);
    wrap.appendChild(dateEl);
    wrap.appendChild(btns);
    wrap.appendChild(inlineEdit);
    return wrap;
  }
</script>

<script>
  const overlay = document.getElementById('overlay');
  const oc = overlay.getContext('2d');

  function resizeOverlay() {
    overlay.width  = window.innerWidth;
    overlay.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeOverlay);

  const ripples = [];
  function addRipple(x, y) { ripples.push({ x, y, r: 0, life: 1.0 }); }

  function loop() {
    oc.clearRect(0, 0, overlay.width, overlay.height);
    for (let i = ripples.length - 1; i >= 0; i--) {
      const rp = ripples[i];
      rp.r    += 3.2;
      rp.life -= 0.013;
      if (rp.life <= 0) { ripples.splice(i, 1); continue; }
      for (let k = 0; k < 3; k++) {
        const kr = rp.r - k * 28;
        if (kr <= 0) continue;
        const progress = Math.min(1, rp.r / 180);
        const alpha    = rp.life * (1 - k * 0.32) * (1 - progress * 0.45);
        oc.beginPath();
        oc.arc(rp.x, rp.y, kr, 0, Math.PI * 2);
        oc.strokeStyle = `rgba(100,70,50,${alpha * 0.4})`;
        oc.lineWidth   = Math.max(0.3, rp.life * 2.0 - k * 0.4);
        oc.stroke();
      }
      if (rp.r < 12) {
        oc.beginPath();
        oc.arc(rp.x, rp.y, rp.r * 0.4, 0, Math.PI * 2);
        oc.fillStyle = `rgba(100,70,50,${rp.life * 0.15})`;
        oc.fill();
      }
    }
    requestAnimationFrame(loop);
  }

  document.addEventListener('click', e => addRipple(e.clientX, e.clientY));
  document.addEventListener('touchstart', e => {
    Array.from(e.changedTouches).forEach(t => addRipple(t.clientX, t.clientY));
  }, { passive: true });

  window.addEventListener('load', () => { resizeOverlay(); loop(); });
</script>
</body>
</html>
