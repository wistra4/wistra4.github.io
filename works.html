<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Works — wistra</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f5f3;
      --border: #d8d8d6;
      --text: #000;
      --muted: #999;
      --card-bg: #f5f5f3;
      --card-hover: #ebebea;
      --placeholder: #e0e0de;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    header {
      padding: 36px 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--text);
    }

    nav { display: flex; gap: 32px; }

    nav a {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-decoration: none;
      color: var(--muted);
      transition: color 0.2s;
    }

    nav a:hover, nav a.active { color: var(--text); }

    .page-title {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 14px 56px;
    }

    .page-title h1 {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.25em;
      color: var(--muted);
    }

    .section { padding: 48px 56px; }

    .section-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.25em;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .card {
      background: var(--card-bg);
      padding: 20px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: background 0.2s;
    }

    .card:hover { background: var(--card-hover); }

    .card-img {
      aspect-ratio: 1 / 1;
      background: var(--placeholder);
      margin-bottom: 14px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
      transition: filter 0.3s;
    }

    .card:hover .card-img img { filter: grayscale(0%); }

    .card-placeholder {
      font-size: 9px; color: #bbb; letter-spacing: 0.2em;
    }

    .card-tag {
      display: inline-block;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 0.15em;
      padding: 2px 6px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .card-desc {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 56px;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 24px 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 48px;
    }

    .footer-copy { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a {
      font-size: 9px; letter-spacing: 0.12em;
      text-decoration: none; color: var(--muted); transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--text); }
  </style>
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <header>
    <a href="index.html" class="logo">wistra</a>
    <nav>
      <a href="works.html" class="active">WORKS</a>
      <a href="dj.html">DJ</a>
      <a href="about.html">ABOUT</a>
    </nav>
  </header>

  <div class="page-title"><h1>WORKS</h1></div>

  <!-- DESIGN -->
  <div class="section">
    <div class="section-label">DESIGN</div>
    <div class="grid">
      <a class="card" href="works/bluesq.html">
        <div class="card-img"><img src="img/works/bluesq/bluesq.png" alt="bluesq"></div>
        <span class="card-tag">DESIGN</span>
        <div class="card-title">bluesq</div>
        <div class="card-desc">—</div>
      </a>
      <a class="card" href="works/account.html">
        <div class="card-img"><img src="img/works/account/account.png" alt="account music"></div>
        <span class="card-tag">DESIGN</span>
        <div class="card-title">account music</div>
        <div class="card-desc">—</div>
      </a>
      <a class="card" href="works/negai.html">
        <div class="card-img"><img src="img/works/negai/negai.jpg" alt="競争願理主義"></div>
        <span class="card-tag">DESIGN</span>
        <div class="card-title">競争願理主義</div>
        <div class="card-desc">—</div>
      </a>
      <a class="card" href="works/tokimeki.html">
        <div class="card-img"><img src="img/works/tokimeki/tokimeki.jpg" alt="トキメキ情報量"></div>
        <span class="card-tag">DESIGN</span>
        <div class="card-title">トキメキ情報量</div>
        <div class="card-desc">—</div>
      </a>
    </div>
  </div>


  <footer>
    <div class="footer-copy">© 2026 wistra</div>
    <div class="footer-links">
      <a href="https://www.instagram.com/wistra4/" target="_blank">INSTAGRAM</a>
    </div>
  </footer>

</body>
</html>
